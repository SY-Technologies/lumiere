name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            cpack_generator: TGZ
            cmake_extra_args: ""
          - os: macos-15-intel
            label: macos-x86_64
            cpack_generator: TGZ
            cmake_extra_args: ""
          - os: macos-latest
            label: macos-arm64
            cpack_generator: TGZ
            cmake_extra_args: ""
          - os: windows-latest
            label: windows-x86_64
            cpack_generator: ZIP
            cmake_extra_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON ${{ matrix.cmake_extra_args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        run: cpack --config CPackConfig.cmake -G ${{ matrix.cpack_generator }}
        working-directory: build

      - name: Rename package
        shell: bash
        run: |
          shopt -s nullglob
          files=(build/*.tar.gz build/*.zip)
          if [ "${#files[@]}" -ne 1 ]; then
            echo "Expected exactly one package, found ${#files[@]}"
            exit 1
          fi
          src="${files[0]}"
          ext="${src##*.}"
          if [[ "$src" == *.tar.gz ]]; then
            ext="tar.gz"
          fi
          dest="build/lumiere-${GITHUB_REF_NAME#v}-${{ matrix.label }}.${ext}"
          mv "$src" "$dest"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumiere-${{ github.ref_name }}-${{ matrix.label }}
          path: build/lumiere-${{ github.ref_name }}-${{ matrix.label }}.*

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/lumiere-${{ github.ref_name }}-${{ matrix.label }}.*
